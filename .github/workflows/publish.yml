name: Publish

on:
  release:
    types: [published]

jobs:
  prepare_release:
    runs-on: ubuntu-latest
    outputs:
      on_main: ${{ steps.tag_check.outputs.on_main }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check tag is on main
        id: tag_check
        run: |
          git fetch origin main --tags --force
          TAG_COMMIT="$(git rev-list -n 1 "refs/tags/${{ github.event.release.tag_name }}")"
          if git merge-base --is-ancestor "$TAG_COMMIT" "origin/main"; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
            echo "Tag is not on main; skipping publish."
          fi

      - name: Set version
        id: version
        if: steps.tag_check.outputs.on_main == 'true'
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  publish_python:
    runs-on: ubuntu-latest
    needs: prepare_release
    if: needs.prepare_release.outputs.on_main == 'true'
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Bump version
        run: uv version "${{ needs.prepare_release.outputs.version }}"

      - name: Build
        run: uv build

      - name: Publish
        run: uv publish dist/*

  publish_node:
    runs-on: ubuntu-latest
    needs: prepare_release
    if: needs.prepare_release.outputs.on_main == 'true'
    environment:
      name: NPM_TOKEN
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: packages/vite
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install deps
        run: uv run deno install

      - name: Bump version
        run: npm version "${{ needs.prepare_release.outputs.version }}" --no-git-tag-version

      - name: Build
        run: npm run build

      - name: Test
        run: npm test --if-present

      - name: Publish
        run: npm publish --provenance --access public
