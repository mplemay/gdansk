name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  prek:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install python dependencies
        run: uv sync --all-groups --all-extras --all-packages

      - name: Install TypeScript package dependencies (Deno)
        shell: bash
        run: |
          set -euo pipefail
          uv run deno install
          for d in packages/vite examples/fastapi/src/mount/views examples/get-time/src/get_time/views examples/ssr/src/ssr/views examples/shadcn/src/shadcn/views; do
            (cd "$d" && uv run deno install)
          done

      - uses: j178/prek-action@v1

  test-python:
    name: test (python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-groups --all-extras --all-packages

      - name: Install example views dependencies (Deno)
        shell: bash
        run: |
          set -euo pipefail
          for d in examples/fastapi/src/mount/views examples/get-time/src/get_time/views examples/ssr/src/ssr/views examples/shadcn/src/shadcn/views; do
            (cd "$d" && uv run deno install)
          done

      - name: Run tests
        run: uv run pytest
