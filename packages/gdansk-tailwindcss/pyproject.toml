[project]
name = "gdansk-tailwindcss"
version = "0.1.0"
description = "Tailwind CSS transform plugin for gdansk-bundler"
readme = "README.md"
authors = [
    { name = "Matt LeMay", email = "mplemay@users.noreply.github.com" }
]
requires-python = ">=3.12,<3.15"
dependencies = [
    "gdansk-bundler",
    "gdansk-runtime",
]

[tool.hatch.build.targets.wheel]
packages = ["src/gdansk_tailwindcss"]

[tool.hatch.build.targets.wheel.force-include]
"src/gdansk_tailwindcss/tailwind_shim.mjs" = "gdansk_tailwindcss/tailwind_shim.mjs"

[tool.uv]
cache-keys = [{ file = "pyproject.toml" }, { file = "src/**/*.py" }, { file = "src/**/*.mjs" }]

[tool.uv.sources]
gdansk-bundler = { workspace = true }
gdansk-runtime = { workspace = true }

[tool.ruff]
extend = "../../pyproject.toml"
target-version = "py312"

[tool.ruff.lint]
ignore = ["D"]

[build-system]
requires = ["hatchling>=1.27,<2"]
build-backend = "hatchling.build"
