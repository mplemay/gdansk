[project]
name = "gdansk-runtime"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Matt LeMay", email = "mplemay@users.noreply.github.com" }
]
requires-python = ">=3.12,<3.15"
dependencies = [
    "pydantic>=2,<3",
]

[project.scripts]
gdansk-runtime = "gdansk_runtime:main"

[tool.maturin]
module-name = "gdansk_runtime._core"
python-packages = ["gdansk_runtime"]
python-source = "src"

[tool.uv]
cache-keys = [{ file = "pyproject.toml" }, { file = "src/**/*.rs" }, { file = "Cargo.toml" }, { file = "Cargo.lock" }]

[tool.ruff]
extend = "../../pyproject.toml"
target-version = "py312"

[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"
