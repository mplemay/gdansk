[package]
name = "gdansk_runtime"
version = "0.1.0"
edition = "2024"

[lib]
name = "_core"
crate-type = ["cdylib"]

[dependencies]
async-trait = "0.1"
deno_config = { version = "=0.94.0", features = ["workspace", "sync"] }
deno_core = "=0.397.0"
deno_error = "=0.7.1"
deno_lockfile = "=0.46.0"
deno_npm = "=0.56.0"
deno_npm_cache = "=0.63.0"
deno_npm_installer = "=0.39.0"
deno_npmrc = "=0.5.0"
deno_package_json = { version = "=0.46.0", features = ["sync"] }
deno_resolver = { version = "=0.75.0", features = ["graph", "sync"] }
deno_task_shell = "=0.29.0"
deno_web = "=0.275.0"
deno_webidl = "=0.244.0"
http = "1"
node_resolver = { version = "=0.82.0", features = ["sync"] }
oxc_resolver = "11.18"
pyo3 = { version = "0.28.2", features = ["extension-module", "abi3-py312"] }
pyo3-async-runtimes = { version = "0.28", features = ["attributes", "tokio-runtime"] }
reqwest = { version = "=0.12.5", default-features = false, features = ["rustls-tls", "stream", "gzip", "brotli", "json", "http2"] }
sys_traits = { version = "=0.1.27", features = ["real"] }
tokio = "1.40"
url = "2.5"
