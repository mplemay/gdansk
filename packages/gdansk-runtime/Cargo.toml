[package]
name = "gdansk_runtime"
version = "0.1.0"
edition = "2024"

[lib]
name = "_core"
crate-type = ["cdylib"]

[dependencies]
async-trait = "0.1"
deno_config = { git = "https://github.com/denoland/deno", tag = "v2.7.11", submodules = false, features = ["workspace", "sync"] }
deno_core = { git = "https://github.com/denoland/deno", tag = "v2.7.11" , submodules = false}
deno_error = "=0.7.1"
deno_lockfile = { git = "https://github.com/denoland/deno", tag = "v2.7.11", submodules = false }
deno_npm = { git = "https://github.com/denoland/deno", tag = "v2.7.11" , submodules = false}
deno_npm_cache = { git = "https://github.com/denoland/deno", tag = "v2.7.11", submodules = false }
deno_npm_installer = { git = "https://github.com/denoland/deno", tag = "v2.7.11", submodules = false }
deno_npmrc = { git = "https://github.com/denoland/deno", tag = "v2.7.11", submodules = false }
deno_package_json = { git = "https://github.com/denoland/deno", tag = "v2.7.11", submodules = false, features = ["sync"] }
deno_resolver = { git = "https://github.com/denoland/deno", tag = "v2.7.11", submodules = false, features = ["graph", "sync"] }
deno_web = { git = "https://github.com/denoland/deno", tag = "v2.7.11", submodules = false }
deno_webidl = { git = "https://github.com/denoland/deno", tag = "v2.7.11", submodules = false }
http = "1"
node_resolver = { git = "https://github.com/denoland/deno", tag = "v2.7.11", submodules = false, features = ["sync"] }
pyo3 = { version = "0.28.2", features = ["extension-module", "abi3-py311"] }
pyo3-async-runtimes = { version = "0.28", features = ["attributes", "tokio-runtime"] }
reqwest = { version = "=0.12.5", default-features = false, features = ["rustls-tls", "stream", "gzip", "brotli", "json", "http2"] }
sys_traits = { version = "=0.1.27", features = ["real"] }
tokio = "1.40"
url = "2.5"
