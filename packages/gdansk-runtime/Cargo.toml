[package]
name = "gdansk_runtime"
version = "0.1.0"
edition = "2024"

[lib]
name = "_core"
crate-type = ["cdylib"]

[dependencies]
async-trait = "0.1"
deno_config = { path = "../../deno/libs/config", features = ["workspace", "sync"] }
deno_core = "0.396"
deno_error = "=0.7.1"
deno_lockfile = { path = "../../deno/libs/lockfile" }
deno_npm = { path = "../../deno/libs/npm" }
deno_npm_cache = { path = "../../deno/libs/npm_cache" }
deno_npm_installer = { path = "../../deno/libs/npm_installer" }
deno_npmrc = { path = "../../deno/libs/npmrc" }
deno_package_json = { path = "../../deno/libs/package_json", features = ["sync"] }
deno_resolver = { path = "../../deno/libs/resolver", features = ["graph", "sync"] }
http = "1"
node_resolver = { path = "../../deno/libs/node_resolver", features = ["sync"] }
pyo3 = { version = "0.28.2", features = ["extension-module", "abi3-py311"] }
pyo3-async-runtimes = { version = "0.28", features = ["attributes", "tokio-runtime"] }
reqwest = { version = "=0.12.5", default-features = false, features = ["rustls-tls", "stream", "gzip", "brotli", "json", "http2"] }
sys_traits = { version = "=0.1.27", features = ["real"] }
tokio = "1.40"
url = "2.5"
