[project]
name = "gdansk-vite"
version = "0.1.0"
description = "Embedded Vite CSS transform compatibility helpers for gdansk"
readme = "README.md"
authors = [
    { name = "Matt LeMay", email = "mplemay@users.noreply.github.com" }
]
requires-python = ">=3.12,<3.15"
dependencies = []

[tool.maturin]
module-name = "gdansk_vite._core"
python-packages = ["gdansk_vite"]
python-source = "src"

[tool.uv]
cache-keys = [{ file = "pyproject.toml" }, { file = "src/**/*.py" }, { file = "src/**/*.js" }, { file = "src/**/*.rs" }, { file = "Cargo.toml" }, { file = "Cargo.lock" }]

[tool.ruff]
extend = "../../pyproject.toml"
target-version = "py312"

[tool.ruff.lint]
ignore = ["D"]

[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"
