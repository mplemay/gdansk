[package]
name = "gdansk_vite"
version = "0.1.0"
edition = "2024"

[lib]
name = "_core"
crate-type = ["cdylib"]

[dependencies]
deno_core = "0.396"
deno_error = "0.7"
dunce = "1.0"
oxc_resolver = "11.18"
pyo3 = { version = "0.28.2", features = ["extension-module", "abi3-py312"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = "1.40"
url = "2.5"
