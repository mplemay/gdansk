[package]
name = "gdansk_vite"
version = "0.1.0"
edition = "2024"

[lib]
name = "_core"
crate-type = ["cdylib"]

[dependencies]
deno_core = "0.397"
deno_error = "0.7"
dunce = "1.0"
# Pin ICU 2.1.x: temporal_rs (via v8) does not compile against ICU 2.2; unblocks resolution with url/idna.
icu_calendar = "=2.1.1"
icu_calendar_data = "=2.1.1"
icu_collections = "=2.1.1"
icu_locale = "=2.1.1"
icu_locale_core = "=2.1.1"
icu_locale_data = "=2.1.2"
icu_normalizer = "=2.1.1"
icu_normalizer_data = "=2.1.1"
icu_properties = "=2.1.2"
icu_properties_data = "=2.1.2"
icu_provider = "=2.1.1"
oxc_resolver = "11.18"
pyo3 = { version = "0.28.2", features = ["extension-module", "abi3-py312"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = "1.40"
url = "2.5"
