[project]
name = "gdansk-bundler"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Matt LeMay", email = "mplemay@users.noreply.github.com" }
]
requires-python = ">=3.12,<3.15"
dependencies = []

[tool.maturin]
module-name = "gdansk_bundler._core"
python-packages = ["gdansk_bundler"]
python-source = "src"

[tool.uv]
cache-keys = [{ file = "pyproject.toml" }, { file = "src/**/*.rs" }, { file = "Cargo.toml" }, { file = "Cargo.lock" }]
exclude-newer = "7 days"

[tool.ruff]
extend = "../../pyproject.toml"
target-version = "py312"

[tool.ruff.lint]
# Matches AGENTS.md: no module/docstrings; pydocstyle (D) rules are disabled for this package only.
ignore = ["D"]

[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"
